# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json
gui:
  statusPanelView: allBranchesLog
  filterMode: fuzzy
  nerdFontsVersion: '3'
  showDivergenceFromBaseBranch: 'arrowAndNumber'
  sidePanelWidth: 0.25
git:
  pagers:
    - pager: 'delta'
confirmOnQuit: true
customCommands:
  - key: 'u'
    context: 'commits'
    description: 'Restore changes from file'
    prompts:
      - type: 'input'
        title: 'Select a file to restore its changes:'
        key: 'fileToRestore'
        suggestions:
          command: 'git diff-tree --no-commit-id --name-only -r {{.SelectedLocalCommit.Sha}}'
      - type: 'confirm'
        title: 'Confirm to restore changes'
        body: 'Are you sure you want to restore the changes of "{{.Form.fileToRestore}}"?.'
    command: 'git restore --source={{.SelectedLocalCommit.Sha}}~1 --worktree -- {{.Form.fileToRestore | quote}}'
    loadingText: 'Restoring file...'
    after:
      checkForConflicts: true
  - key: '<ctrl-alt-p>'
    context: 'commits'
    description: 'Push up to selected commit'
    prompts:
      - type: 'confirm'
        title: 'Partial push on "{{.CheckedOutBranch.UpstreamRemote}}/{{.CheckedOutBranch.UpstreamBranch}}"'
        body: "This will push changes in {{.CheckedOutBranch.Name}} up to commit \n\n{{.SelectedCommit.Hash}}\n\nAre you sure about that?"
    command: 'sh -c ''remote="{{.CheckedOutBranch.UpstreamRemote}}"; branch="{{.CheckedOutBranch.UpstreamBranch}}"; if [ -z "$remote" ] || [ -z "$branch" ]; then echo "Error: current branch has no upstream configured" >&2; exit 1; fi; git push "$remote" "{{.SelectedCommit.Hash}}:refs/heads/$branch"'''
    loadingText: 'Pushing...'
    output: 'log'
